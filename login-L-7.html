<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    
    <style>
        
        body {
            background-color: honeydew;
            font-style: normal;
            height: 100vh; 
            margin: 0; 
            padding: 0;
            
            display: grid;
            
            grid-template-columns: 1fr; 
            
            grid-template-rows: auto 1fr auto; 
            grid-template-areas:
                "page-header"
                "page-content"
                "page-footer";
        }

        
        .page-header {
            grid-area: page-header; 
            text-align: center;
            padding: 50px 0;
            background-color: lightcoral; 
        }

        h1 {
            font-size: xx-large;
            color: rgb(179, 15, 15);
            margin: 0; 
        }

        
        .page-footer {
            grid-area: page-footer; 
            padding: 10px;
            background-color: rgb(191, 89, 91); 
            text-align: center;
        }
        
        
        .main-box-container {
            grid-area: page-content; 
            display: flex;
            align-items: center;    
            justify-content: center; 
        }

        
        .login-box {
            border-width: 5px;
            border-style: solid;
            border-color: darkslategray; 
            background-color: azure;
            
            
            padding:40px; 
            max-width: 500px;
            width: 90%; 
            

            margin: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 { 
            color: black;
            text-align: center;
            margin: 5px 0; 
        }
        
        

    </style>
</head>
<body align="center">
    
    <div class="page-header">
        <h1>LANGUAGE HUB</h1>
        
    </div>

    <div class="main-box-container">
        <div class="login-box">
            <h2>Login Page</h2><br>
            <form action="languagehub7grid.html" method="get">
                Enter your username:<input type="name" required ><br><br>
                Enter your password:<input type="phno" required ><br><br>
                <input type="submit" value="login"> 
            </form>
        </div>
    </div>
    
    <div class="page-footer">
        <h2>Don't have an account?<a href="signup-L-7.html">Sign up here</a></h2>
    </div>

</body>
</html>
